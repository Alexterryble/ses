<script>
/* ============================================================
   NORMALIZACIÓN DE NOMBRE COMPLETO
============================================================ */
(function(){
  const ids = ['nombre1', 'nombre2', 'nombre3'];

  function normalize(el){
    const txt = (el.textContent || '')
      .replace(/\s*\n+\s*/g, ' ')
      .replace(/\s{2,}/g, ' ')
      .trim()
      .toUpperCase();

    el.textContent = txt;
    localStorage.setItem('calc_' + el.id, txt);
  }

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    const saved = localStorage.getItem('calc_' + id);
    if (saved) el.textContent = saved;

    el.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        el.blur();
      }
    });

    el.addEventListener('input', () => {
      localStorage.setItem('calc_' + id, el.textContent);
    });

    el.addEventListener('blur', () => normalize(el));
  });
})();

/* ============================================================
   CONFIG DEBUG

const DEBUG_RETRO = false;

/* ============================================================
   ÚTILES GENERALES
============================================================ */
const $  = (s, sc = document) => sc.querySelector(s);
const $$ = (s, sc = document) => Array.from(sc.querySelectorAll(s));

const fmtMoney = n =>
  new Intl.NumberFormat('es-MX', {
    style: 'currency',
    currency: 'MXN'
  }).format(Number(n) || 0);

const setText = (sel, val) => {
  const el = $(sel);
  if (el) el.textContent = val;
};

function round2(n){
  return Math.round((Number(n) + Number.EPSILON) * 100) / 100;
}

function round6(n){
  return Math.round((Number(n) + Number.EPSILON) * 1000000) / 1000000;
}

function mxnToNumber(valor){
  if (valor == null) return 0;

  let txt = String(valor)
    .replace(/\u00A0/g, '')
    .replace(/\s+/g, '')
    .replace(/[^\d.,-]/g, '');

  if (!txt) return 0;

  const lastDot = txt.lastIndexOf('.');
  const lastComma = txt.lastIndexOf(',');

  if (lastDot > lastComma) {
    txt = txt.replace(/,/g, '');
  } else if (lastComma > lastDot) {
    txt = txt.replace(/\./g, '').replace(',', '.');
  } else {
    txt = txt.replace(/[^\d.-]/g, '');
  }

  const n = Number(txt);
  return Number.isFinite(n) ? n : 0;
}

function normalizePercent(p){
  let v = Number(p);

  if (!Number.isFinite(v)) return null;

  if (v < 1) v = v * 100;

  return v;
}

function money(n){
  return fmtMoney(n);
}

/* ============================================================
   BASE URL / PARAMS
============================================================ */
function getPublicBase(){
  const p = location.pathname.replace(/\/+$/, "/");
  const i = p.toLowerCase().lastIndexOf("/public/");
  return i >= 0 ? p.slice(0, i + 8) : "/";
}

const BASE_URL = getPublicBase();

function getParam(name){

function getPeriodosManual(){

  const raw = String(el.value ?? '').trim();
  if (!raw) return null;

  const n = Number(raw);
  return Number.isFinite(n) && n > 0 ? Math.floor(n) : null;
}

  if (!el) return;

  if (el.dataset.manual === '1') return;

  el.value = (n && n > 0) ? String(Math.floor(n)) : '';

function markPeriodosAuto(){

   ESTADO

let TASA = 10.075;

const TOPE = 25;

/* ============================================================
   FECHAS
============================================================ */
function normalizeISO(s){
  if (!s) return '';

  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  const m = String(s).match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);

  if (m) {
    const y  = Number(m[3]);
    const mo = Number(m[2]);
    const d  = Number(m[1]);

    return `${y}-${String(mo).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  return '';
}

function addDays(anyDateString, days = 1){
  const iso = normalizeISO(anyDateString);
  if (!iso) return '';

  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);

  dt.setDate(dt.getDate() + days);

  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
}

function parseLocalDateAny(s){
  if (!s) return null;

  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);

  if (m) {
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }

  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function ymFromDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  return `${y}-${m}`;
}

function getPrevYM(ym){
  const [y, m] = String(ym).split('-').map(Number);
  const d = new Date(y, m - 2, 1);

  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getNextYM(ym){
  const [y, m] = String(ym).split('-').map(Number);
  const d = new Date(y, m, 1);

  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getFechaCalculoReal(){
  return window.__fechaCalculoDate || new Date();
}

function setFechaEncabezadoFija(iso){
  const el = document.getElementById('fechaHoy');
  if (!el || !iso) return;

  const d = parseLocalDateAny(iso);
  if (!d) return;

  window.__fechaCalculoDate = d;

  let txt = d.toLocaleDateString('es-MX', {
    weekday: 'long',
    day: '2-digit',
    month: 'long',
    year: 'numeric'
  });

  txt = txt.charAt(0).toUpperCase() + txt.slice(1);
  txt = txt.replace(/, /, ',\u00A0').replace(/ de /g, '\u00A0de\u00A0');

  el.textContent = txt;
  el.dataset.fija = '1';
}

window.setFechaEncabezadoFija = setFechaEncabezadoFija;

/* ============================================================
   LISTA DE MESES
============================================================ */
function monthListInclusive(fromISO, toDate = new Date()){
  if (!fromISO) return [];

  const iso = normalizeISO(fromISO);
  if (!iso) return [];

  const [y, m] = iso.split('-').map(Number);
  const start = new Date(y, m - 1, 1);

  const manualN = getPeriodosManual();

  if (Number.isFinite(manualN) && manualN > 0) {
    const out = [];

    for (let i = 0; i < manualN; i++) {
      out.push(new Date(start.getFullYear(), start.getMonth() + i, 1));
    }

    return out;
  }

  const end = new Date(toDate.getFullYear(), toDate.getMonth(), 1);

  if (start > end) return [];

  const out = [];
  let a = new Date(start);

  while (a <= end) {
    out.push(new Date(a));
    a = new Date(a.getFullYear(), a.getMonth() + 1, 1);
  }

  return out;
}

/* ============================================================
   API
============================================================ */
const API_VALORES = `${BASE_URL}app/controllers/Calculadora/valores.php`;

async function getJSON(url){
  const r = await fetch(url, {
    cache: 'no-store',
    credentials: 'same-origin'
  });

  if (!r.ok) throw new Error(`HTTP ${r.status}`);

  return r.json();
}

/* ============================================================
   CATÁLOGOS DESDE BD
============================================================ */
async function fetchYearCatalog(year){
  year = Number(year);

  if (!year) {
    return {
      uma: null,
      topado: null,
      tasa: null,
      imssValores: null
    };
  }

  if (CACHE.years[year]) return CACHE.years[year];

  if (CACHE.promises.years[year]) {
    return CACHE.promises.years[year];
  }

  CACHE.promises.years[year] = getJSON(`${API_VALORES}?action=catalogos&year=${year}`)
    .then(j => {
      if (!j.ok) {
        throw new Error(j.msg || 'No se pudieron cargar catálogos');
      }

      const uma    = (j.data?.uma != null) ? Number(j.data.uma) : null;
      const topado = (j.data?.topado != null) ? Number(j.data.topado) : null;

      const imssValores = j.data?.imss_valores || null;

      const tasa = imssValores?.total != null
        ? normalizePercent(imssValores.total)
        : ((j.data?.porcentaje != null) ? normalizePercent(j.data.porcentaje) : null);

      CACHE.years[year] = {
        uma,
        topado,
        tasa,
        imssValores
      };

      if (DEBUG_RETRO) {
        console.log('📌 CATÁLOGOS CARGADOS', {
          year,
          uma,
          topado,
          tasa,
          source: j.data?.tasa_source,
          imssValores
        });
      }

      return CACHE.years[year];
    })
    .finally(() => {
      delete CACHE.promises.years[year];
    });

  return CACHE.promises.years[year];
}

function umaYearForDate(isoDate){
  if (!isoDate) return null;

  const m = String(isoDate).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;

  const y  = Number(m[1]);
  const mo = Number(m[2]);

  return (mo >= 2) ? y : (y - 1);
}

async function ensureCatalogosFromAlta(){
  const fAlta = document.getElementById('fAlta');

  if (!fAlta || !fAlta.value) return;

  const year = umaYearForDate(fAlta.value);

  if (!year) return;

  if (year !== lastYearLoaded || !CACHE.years[year]) {
    const cat = await fetchYearCatalog(year);

    if (cat.uma != null)  UMA  = cat.uma;
    if (cat.tasa != null) TASA = cat.tasa;

    lastYearLoaded = year;
  } else {
    const cat = CACHE.years[year];

    if (cat.uma != null)  UMA  = cat.uma;
    if (cat.tasa != null) TASA = cat.tasa;
  }

  if (DEBUG_RETRO) {
    console.log('✅ UMA/TASA por regla Feb-01', {
      fAlta: fAlta.value,
      year,
      UMA,
      TASA
    });
  }
}

/* ============================================================
   INPC
============================================================ */
async function fetchINPC(ym){
  const j = await getJSON(`${API_VALORES}?action=inpc&ym=${ym}`);

  if (!j.ok) throw new Error(j.msg || 'INPC no encontrado');

  const valor = Number(
    j.data?.inpc ??
    j.data?.valor ??
    j.data?.indice ??
    j.data?.value ??
    0
  );

  if (!Number.isFinite(valor) || valor <= 0) {
    throw new Error('INPC inválido para ' + ym);
  }

  return valor;
}

async function fetchINPCRange(fromYM, toYM){
  const key = `${fromYM}|${toYM}`;

  if (CACHE.promises.inpcRange[key]) {
    return CACHE.promises.inpcRange[key];
  }

  const url = `${API_VALORES}?action=inpc_range&from=${fromYM}&to=${toYM}`;

  CACHE.promises.inpcRange[key] = getJSON(url)
    .then(j => {
      if (!j.ok) throw new Error(j.msg || 'INPC rango no encontrado');

      const map = {};

      if (j.data?.map && typeof j.data.map === 'object') {
        Object.entries(j.data.map).forEach(([ym, valor]) => {
          const n = Number(valor || 0);
          if (ym && Number.isFinite(n) && n > 0) map[ym] = n;
        });
      } else {
        const items =
          j.data?.items ||
          j.data?.rows ||
          j.items ||
          j.rows ||
          [];

        for (const it of items) {
          const mesRaw = String(it.mes ?? it.fecha ?? it.periodo ?? '');
          const ym = mesRaw.slice(0, 7);

          const valor = Number(
            it.inpc ??
            it.valor ??
            it.indice ??
            it.value ??
            0
          );

          if (ym && Number.isFinite(valor) && valor > 0) {
            map[ym] = valor;
          }
        }
      }

      if (DEBUG_RETRO) {
        console.log('✅ INPC MAP CARGADO:', {
          fromYM,
          toYM,
          totalMap: Object.keys(map).length,
          primero: Object.keys(map).sort()[0],
          ultimo: Object.keys(map).sort().at(-1),
          map
        });
      }

      return map;
    })
    .finally(() => {
      delete CACHE.promises.inpcRange[key];
    });

  return CACHE.promises.inpcRange[key];
}

function calcularFactorActualizacionINPC(ymBaseINPC, calcYM, inpcMap){
  const keys = Object.keys(inpcMap || {})
    .filter(k => /^\d{4}-\d{2}$/.test(k))
    .filter(k => k <= calcYM)
    .filter(k => Number(inpcMap[k]) > 0)
    .sort();

  if (!keys.length) {
    return {
      multiplicador: 1,
      factor: 0,
      inpcPeriodo: 0,
      inpcActual: 0,
      ultimoYM: null
    };
  }

  const ultimoYM = keys[keys.length - 1];
  const inpcActual = Number(inpcMap[ultimoYM] || 0);
  const inpcPeriodo = Number(inpcMap[ymBaseINPC] || 0);

  if (!inpcPeriodo || ymBaseINPC >= ultimoYM) {
    return {
      multiplicador: 1,
      factor: 0,
      inpcPeriodo,
      inpcActual,
      ultimoYM
    };
  }

  const multiplicador = inpcActual / inpcPeriodo;
  const factor = Math.max(0, multiplicador - 1);

  return {
    multiplicador,
    factor,
    inpcPeriodo,
    inpcActual,
    ultimoYM
  };
}

/* ============================================================
   RECARGOS DESDE BD OPTIMIZADOS
============================================================ */
async function fetchRecargosRange(fromYM, toYM){
  const key = `${fromYM}|${toYM}`;

  if (CACHE.promises.recargosRange[key]) {
    return CACHE.promises.recargosRange[key];
  }

  const url = `${API_VALORES}?action=recargos_range&from=${fromYM}&to=${toYM}`;

  CACHE.promises.recargosRange[key] = getJSON(url)
    .then(j => {
      if (!j.ok) {
        throw new Error(j.msg || 'No se pudo cargar rango de recargos');
      }

      const map = {};

      if (j.data?.map && typeof j.data.map === 'object') {
        Object.entries(j.data.map).forEach(([ym, tasa]) => {
          let v = Number(tasa || 0);

          /*
            Correcto:
            2025 => 1.47
            2026 => 2.07

            Si por error llega 147 o 207, se corrige.
          */
          if (v > 20) v = v / 100;

          map[ym] = v;
        });
      } else {
        const items = j.data?.items || [];

        for (const it of items) {
          const ym = String(it.ym || it.fecha || '').slice(0, 7);
          let v = Number(it.tasa_pct || 0);

          if (v > 20) v = v / 100;

          if (ym) map[ym] = v;
        }
      }

      if (DEBUG_RETRO) {
        console.log('✅ RECARGOS MAP CARGADO:', {
          fromYM,
          toYM,
          map
        });
      }

      return map;
    })
    .catch(async e => {
      console.warn('⚠️ Falló recargos_range. Fallback mes por mes:', e);

      const map = {};
      let cursor = fromYM;

      while (cursor <= toYM) {
        const fecha = `${cursor}-01`;
        const urlMes = `${API_VALORES}?action=recargo&fecha=${fecha}`;

        try {
          const j = await getJSON(urlMes);

          if (j.ok) {
            let tasa = Number(j.data?.tasa_pct || 0);
            if (tasa > 20) tasa = tasa / 100;
            map[cursor] = tasa;
          } else {
            map[cursor] = 0;
          }
        } catch {
          map[cursor] = 0;
        }

        cursor = getNextYM(cursor);
      }

      return map;
    })
    .finally(() => {
      delete CACHE.promises.recargosRange[key];
    });

  return CACHE.promises.recargosRange[key];
}

/* ============================================================
   REGLA DEL DÍA 17 PARA RECARGOS
============================================================ */
function ymFromDateObj(d){
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getYMRecargoCorte(fechaCalculoDate){
  const d = fechaCalculoDate instanceof Date
    ? fechaCalculoDate
    : new Date(fechaCalculoDate);

  const y = d.getFullYear();
  const m = d.getMonth();
  const dia = d.getDate();

  /*
    Regla Excel:
    =IF(DAY(C5)<17, mes anterior, mes actual)

    Día 1 al 16: corta al mes anterior.
    Día 17 en adelante: cuenta mes actual.
  */
  if (dia < 17) {
    return ymFromDateObj(new Date(y, m - 1, 1));
  }

  return ymFromDateObj(new Date(y, m, 1));
}

function obtenerMesesRecargo(ymPeriodo, fechaCalculoDate){
  const ymCorte = getYMRecargoCorte(fechaCalculoDate);

  const meses = [];
  let cursor = ymPeriodo;

  while (cursor <= ymCorte) {
    meses.push(cursor);
    cursor = getNextYM(cursor);
  }

  return meses;
}

function sumarRecargosMensualesPct(ymPeriodo, fechaCalculoDate, recargosMap){
  const meses = obtenerMesesRecargo(ymPeriodo, fechaCalculoDate);

  let totalPct = 0;

  meses.forEach(ym => {
    totalPct += Number(recargosMap[ym] || 0);
  });

  return round6(totalPct);
}

/* ============================================================
   FÓRMULAS EXCEL / IMSS_VALORES
============================================================ */
function getImssValoresYear(year){
  const vals = CACHE.years[year]?.imssValores;

  if (!vals) {
    const tasa = normalizePercent(CACHE.years[year]?.tasa ?? TASA) || 0;

    return {
      year,
      imss: 3.8,
      retiro: 2.0,
      cesantia: round6(Math.max(0, tasa - 3.8 - 2.0)),
      rcv: round6(Math.max(0, tasa - 3.8)),
      total: tasa
    };
  }

  return {
    year: Number(vals.year || year),
    imss: normalizePercent(vals.imss) || 0,
    retiro: normalizePercent(vals.retiro) || 0,
    cesantia: normalizePercent(vals.cesantia) || 0,
    rcv: normalizePercent(vals.rcv) || 0,
    total: normalizePercent(vals.total) || 0
  };
}

function calcularCuotasExcel(baseSBC, tasas){
  const cuotaIMSS = round2(baseSBC * (Number(tasas.imss || 0) / 100));
  const cuotaRetiro = round2(baseSBC * (Number(tasas.retiro || 0) / 100));
  const cuotaCesantia = round2(baseSBC * (Number(tasas.cesantia || 0) / 100));

  const cuotaRCV = round2(cuotaRetiro + cuotaCesantia);
  const importeCotizado = round2(cuotaIMSS + cuotaRCV);

  return {
    cuotaIMSS,
    cuotaRetiro,
    cuotaCesantia,
    cuotaRCV,
    importeCotizado
  };
}

function calcularFilaExcelRetroactivo({
  baseSBC,
  tasas,
  multiplicadorINPC,
  recargoPctAcumulado
}){
  const cuotas = calcularCuotasExcel(baseSBC, tasas);

  const subtotalActualizado = round2(
    cuotas.importeCotizado * Number(multiplicadorINPC || 1)
  );

  const actualizacion = round2(
    subtotalActualizado - cuotas.importeCotizado
  );

  const recargoFrac = Number(recargoPctAcumulado || 0) / 100;

  const recargo = round2(
    subtotalActualizado * recargoFrac
  );

  const recargoYMultas = round2(actualizacion + recargo);
  const totalFila = round2(subtotalActualizado + recargo);

  return {
    ...cuotas,
    subtotalActualizado,
    actualizacion,
    recargoFrac,
    recargo,
    recargoYMultas,
    totalFila
  };
}

/* ============================================================
   SALARIO AUTO
============================================================ */
function isAutoSalary(){
  const el = $('#salario');

  return el && (
    el.dataset.autofill === '1' ||
    el.value === '' ||
    Number(el.value) === 0
  );
}

function setAutoSalaryFlag(on = true){
  const el = $('#salario');
  if (el) el.dataset.autofill = on ? '1' : '0';
}

function setSalaryFromUMA(){
  const umas = Number($('#umasACot')?.value || 1);
  const el = $('#salario');

  if (!el) return;

  if (isAutoSalary()) {
    el.value = (UMA * Math.max(1, umas)).toFixed(2);
    setAutoSalaryFlag(true);
  }
}

/* ============================================================
   CONFIG CÁLCULO
============================================================ */
const APPLY_INPC = true;

/* ============================================================
   CÁLCULO PRINCIPAL OPTIMIZADO
============================================================ */
async function calcular(){
  if (__calculandoRetro) return;
  __calculandoRetro = true;

  const t0 = performance.now();

  try {
    await ensureCatalogosFromAlta();
    setSalaryFromUMA();

    const salario = Number($('#salario')?.value || 0) || 0;
    const umasCot = Number($('#umasACot')?.value || 1) || 1;
    const alta    = $('#fAlta')?.value || '';

    const hoy = window.__fechaCalculoDate || new Date();
    const calcYM = ymFromDate(hoy);

    const mesesArr = monthListInclusive(alta, hoy);
    setPeriodosAuto(mesesArr.length);

    const tbody = $('#tabla tbody');

    if (tbody) tbody.innerHTML = '';

    if (!mesesArr.length || !alta || salario <= 0) {
      setText('#montoGrande', fmtMoney(0));
      return;
    }

    const yearsNeeded = new Set();

    for (const d of mesesArr) {
      const y  = d.getFullYear();
      const mo = d.getMonth() + 1;
      const umaYear = mo >= 2 ? y : y - 1;

      yearsNeeded.add(umaYear);
      yearsNeeded.add(y);
    }

    /*
      OPTIMIZADO:
      antes se hacía await uno por uno.
      ahora se cargan todos los años en paralelo.
    */
    await Promise.all(
      Array.from(yearsNeeded).map(y => fetchYearCatalog(y))
    );

    const altaISO = normalizeISO(alta);
    const altaDay = Number(altaISO.split('-')[2]) || 1;

    const firstYM = `${mesesArr[0].getFullYear()}-${String(mesesArr[0].getMonth() + 1).padStart(2, '0')}`;
    const firstINPCYM = getPrevYM(firstYM);

    /*
      OPTIMIZADO:
      INPC y recargos se piden en paralelo.
      Recargos ya usa action=recargos_range, una sola petición.
    */
    const [inpcMap, recargosMap] = await Promise.all([
      APPLY_INPC
        ? fetchINPCRange(firstINPCYM, calcYM).catch(e => {
            console.warn('INPC no disponible; usando cálculo sin actualización', e);
            return {};
          })
        : Promise.resolve({}),

      fetchRecargosRange(firstYM, calcYM).catch(e => {
        console.warn('Recargos no disponibles; usando 0', e);
        return {};
      })
    ]);

    let granTotal = 0;
    let htmlRows = '';

    for (let i = 0; i < mesesArr.length; i++) {
      const d = mesesArr[i];

      const day = (i === 0) ? altaDay : 1;

      const dateRow = new Date(
        d.getFullYear(),
        d.getMonth(),
        day
      );

      const dd   = String(dateRow.getDate()).padStart(2, '0');
      const mm   = String(dateRow.getMonth() + 1).padStart(2, '0');
      const yyyy = dateRow.getFullYear();

      const mesLabel = `${dd}/${mm}/${yyyy}`;
      const ymPeriodo = `${yyyy}-${mm}`;

      /*
        INPC base:
        periodo 2025-01 usa 2024-12
        periodo 2026-06 usa 2026-05
      */
      const ymKey = getPrevYM(ymPeriodo);

      /*
        UMA:
        enero usa UMA del año anterior.
        febrero en adelante usa UMA del mismo año.
      */
      const umaYear = (Number(mm) >= 2) ? yyyy : (yyyy - 1);
      const umaRow = Number(CACHE.years[umaYear]?.uma ?? UMA);

      /*
        Tasas:
        vienen desde imss_valores.
      */
      const tasasYear = getImssValoresYear(yyyy);
      const tasaPct = Number(tasasYear.total || 0);

      const SBCd_topeado = Math.min(salario, umaRow * TOPE);

      const daysInMonth = new Date(
        yyyy,
        dateRow.getMonth() + 1,
        0
      ).getDate();

      const diasPeriodo = (i === 0)
        ? Math.max(1, daysInMonth - altaDay + 1)
        : daysInMonth;

      const baseSBC = round2(SBCd_topeado * diasPeriodo);

      const fxINPC = calcularFactorActualizacionINPC(
        ymKey,
        calcYM,
        inpcMap
      );

      const multiplicadorINPC = Number(fxINPC.multiplicador || 1);

      /*
        Regla del día 17:
        se manda fecha completa, no solo YYYY-MM.
      */
      const recargoPctAcumulado = sumarRecargosMensualesPct(
        ymPeriodo,
        hoy,
        recargosMap
      );

      const filaExcel = calcularFilaExcelRetroactivo({
        baseSBC,
        tasas: tasasYear,
        multiplicadorINPC,
        recargoPctAcumulado
      });

      granTotal = round2(granTotal + filaExcel.totalFila);

      if (DEBUG_RETRO) {
        console.log('🔎 FILA RETROACTIVO PRODUCCIÓN:', {
          fila: i + 1,
          mesLabel,
          ymPeriodo,
          ymKey,
          umaYear,
          umaRow,
          salario,
          SBCd_topeado,
          diasPeriodo,
          baseSBC,
          tasasYear,
          tasaPct,
          inpcBase: fxINPC.inpcPeriodo,
          inpcActual: fxINPC.inpcActual,
          inpcActualYM: fxINPC.ultimoYM,
          multiplicadorINPC,
          recargoPctAcumulado,
          cuotaIMSS: filaExcel.cuotaIMSS,
          cuotaRetiro: filaExcel.cuotaRetiro,
          cuotaCesantia: filaExcel.cuotaCesantia,
          cuotaRCV: filaExcel.cuotaRCV,
          importeCotizado: filaExcel.importeCotizado,
          subtotalActualizado: filaExcel.subtotalActualizado,
          actualizacion: filaExcel.actualizacion,
          recargo: filaExcel.recargo,
          recargoYMultas: filaExcel.recargoYMultas,
          totalFila: filaExcel.totalFila
        });
      }

      htmlRows += `
        <tr>
          <td>${i + 1}</td>
          <td>${mesLabel}</td>
          <td style="text-align:center">${tasaPct.toFixed(3)}%</td>
          <td>${fmtMoney(filaExcel.importeCotizado)}</td>
          <td>${fmtMoney(filaExcel.recargoYMultas)}</td>
          <td>${fmtMoney(filaExcel.totalFila)}</td>
        </tr>
      `;
    }

    if (tbody) {
      tbody.innerHTML = htmlRows;
    }

    granTotal = round2(granTotal);

    setText('#montoGrande', fmtMoney(granTotal));

    try {
      const data = JSON.parse(sessionStorage.getItem('CIP_DATOS_TABLA3') || '{}');

      data.montoGrande = fmtMoney(granTotal);
      data.montoGrandeNumero = granTotal;

      sessionStorage.setItem('CIP_DATOS_TABLA3', JSON.stringify(data));
    } catch(e) {
      console.error('Error guardando montoGrande:', e);
    }

    console.log('✅ Cálculo retroactivo listo:', {
      total: fmtMoney(granTotal),
      filas: mesesArr.length,
      tiempoMs: Math.round(performance.now() - t0)
    });

  } finally {
    __calculandoRetro = false;
  }
}

/* ============================================================
   LIMPIAR
============================================================ */
function limpiar(){
  if ($('#salario'))  $('#salario').value = 0;
  if ($('#umasACot')) $('#umasACot').value = 1;
  if ($('#fBaja'))    $('#fBaja').value = '';
  if ($('#fAlta'))    $('#fAlta').value = '';

  const p = document.getElementById('periodos');

  if (p) {
    p.value = '';
    p.dataset.manual = '0';
  }

  if ($('#tabla tbody')) $('#tabla tbody').innerHTML = '';

  setText('#montoGrande', '$0.00');
  setAutoSalaryFlag(true);

  window.__fechaCalculoDate = new Date();
}

/* ============================================================
   CARGAR DATOS
============================================================ */
async function cargarDatos(){
  const id = getParam('solicitud_id') || getParam('id') || getParam('folio');
  if (!id) return;

  const url = `${BASE_URL}app/controllers/obtener_datos/get_solicitud_por_id.php?solicitud_id=${encodeURIComponent(id)}`;

  try {
    const r = await fetch(url, {
      credentials: 'same-origin'
    });

    const j = await r.json();

    if (!j || !j.ok) return;

    const c = j.cliente || {};

    window.__cliente_id = Number((c && (c.id || c.cliente_id)) || 0);

    if (document.getElementById('nombre1')) {
      document.getElementById('nombre1').textContent = c.nombres || '';
    }

    if (document.getElementById('nombre2')) {
      document.getElementById('nombre2').textContent = c.apellido_paterno || '';
    }

    if (document.getElementById('nombre3')) {
      document.getElementById('nombre3').textContent = c.apellido_materno || '';
    }

  } catch(e) {
    console.error(e);
  }
}

/* ============================================================
   GUARDAR / ACTUALIZAR
============================================================ */
async function guardarRetroactivo(){
  const solicitud_id = Number(
    getParam('solicitud_id') ||
    getParam('id') ||
    getParam('folio') ||
    0
  );

  if (!solicitud_id) {
    alert('Falta solicitud_id en la URL');
    return;
  }

  const cliente_id = window.__cliente_id ? Number(window.__cliente_id) : 0;

  const nss        = document.getElementById('nss')?.value?.trim() || '';
  const fecha_baja = document.getElementById('fBaja')?.value || '';
  const fecha_alta = document.getElementById('fAlta')?.value || '';
  const umas_cotizar = Number(document.getElementById('umasACot')?.value || 1);
  const salario      = Number(document.getElementById('salario')?.value || 0);

  let periodos_cotizar = null;
  const periodosTxt = String(document.getElementById('periodos')?.value ?? '').trim();

  if (periodosTxt) {
    periodos_cotizar = Number(periodosTxt);
  }

  if (!nss || !fecha_baja || !fecha_alta || !(salario > 0)) {
    alert('Completa NSS, fechas y salario antes de guardar.');
    return;
  }

  const payload = {
    solicitud_id,
    cliente_id,
    nss,
    fecha_baja,
    fecha_alta,
    umas_cotizar,
    salario,
    periodos_cotizar
  };

  const url = `${BASE_URL}app/controllers/Calculadora/guardar.php`;

  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload),
      credentials: 'same-origin'
    });

    const j = await r.json();

    if (!j.ok) {
      throw new Error(j.msg || 'No se pudo guardar');
    }

    alert('¡Guardado correctamente! (ID: ' + j.id + ')');

  } catch(e) {
    console.error(e);
    alert('Error al guardar: ' + e.message);
  }
}

/* ============================================================
   CARGAR RETROACTIVO EXISTENTE
============================================================ */
async function cargarRetroactivoSiExiste(){
  const sid = getParam('solicitud_id') || getParam('id') || getParam('folio');
  if (!sid) return;

  const url = `${BASE_URL}app/controllers/Calculadora/obtener.php?solicitud_id=${encodeURIComponent(sid)}`;
  const $id = id => document.getElementById(id);

  try {
    const r = await fetch(url, {
      credentials: 'same-origin'
    });

    if (!r.ok) return;

    const j = await r.json();

    if (!j.ok) return;

    const retro = j.retroactivo;
    const cli = j.cliente;

    if (cli && cli.id) {
      window.__cliente_id = Number(cli.id);
    }

    if (retro) {
      if ($id('nss'))      $id('nss').value      = retro.nss || '';
      if ($id('fBaja'))    $id('fBaja').value    = retro.fecha_baja || '';
      if ($id('fAlta'))    $id('fAlta').value    = retro.fecha_alta || '';
      if ($id('umasACot')) $id('umasACot').value = retro.umas_cotizar ?? 1;

      if ($id('salario')) {
        $id('salario').value = retro.salario ?? 0;
        setAutoSalaryFlag(false);
      }

      const p = $id('periodos');

      if (p) {
        p.value = retro.periodos_cotizar ? String(retro.periodos_cotizar) : '';
        p.dataset.manual = retro.periodos_cotizar ? '1' : '0';
      }

      const fechaFija =
        retro.fecha_calculo_ts ||
        retro.fecha_calculo_date ||
        retro.created_at;

      if (fechaFija) {
        setFechaEncabezadoFija(fechaFija);
      }
    }

    requestAnimationFrame(() => calcular());

  } catch(e) {
    console.error('Error cargando retroactivo:', e);
  }
}

/* ============================================================
   RESUMEN / DIAGNÓSTICO
============================================================ */
function obtenerFilasSistema(){
  const rows = Array.from(document.querySelectorAll('#tabla tbody tr'));

  return rows.map(tr => {
    const tds = Array.from(tr.querySelectorAll('td'));

    return {
      no: mxnToNumber(tds[0]?.textContent || '0'),
      mes: (tds[1]?.textContent || '').trim(),
      tasa: (tds[2]?.textContent || '').trim(),
      importeCotizado: mxnToNumber(tds[3]?.textContent || '0'),
      recargoYMultas: mxnToNumber(tds[4]?.textContent || '0'),
      totalPagar: mxnToNumber(tds[5]?.textContent || '0')
    };
  });
}

function imprimirResumenSistema(){
  const filas = obtenerFilasSistema();

  const sumaImporte = filas.reduce((acc, f) => acc + f.importeCotizado, 0);
  const sumaRecargos = filas.reduce((acc, f) => acc + f.recargoYMultas, 0);
  const sumaTotal = filas.reduce((acc, f) => acc + f.totalPagar, 0);

  console.table({
    filas: filas.length,
    sumaImporte: fmtMoney(sumaImporte),
    sumaRecargoYMultas: fmtMoney(sumaRecargos),
    sumaTotal: fmtMoney(sumaTotal)
  });

  return {
    filas,
    sumaImporte: round2(sumaImporte),
    sumaRecargos: round2(sumaRecargos),
    sumaTotal: round2(sumaTotal)
  };
}

/* ============================================================
   LISTENERS
============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  window.__fechaCalculoDate = new Date();

  const elFechaHoy = $('#fechaHoy');

  if (elFechaHoy && !elFechaHoy.dataset.fija) {
    const hoy = new Date();

    let txt = hoy.toLocaleDateString('es-MX', {
      weekday: 'long',
      day: '2-digit',
      month: 'long',
      year: 'numeric'
    });

    txt = txt.charAt(0).toUpperCase() + txt.slice(1);
    txt = txt.replace(/, /, ',\u00A0').replace(/ de /g, '\u00A0de\u00A0');

    elFechaHoy.textContent = txt;
  }

  const nss = document.getElementById('nss');

  nss?.addEventListener('input', () => {
    nss.value = nss.value.replace(/\D+/g, '').slice(0, 11);
  });

  const periodosEl = document.getElementById('periodos');

  if (periodosEl) {
    periodosEl.dataset.manual = periodosEl.dataset.manual || '0';

    periodosEl.addEventListener('input', () => {
      periodosEl.value = periodosEl.value.replace(/\D+/g, '');
      markPeriodosManual();
    });
  }

  $('#btnCalcular')?.addEventListener('click', async () => {
    await calcular();
  });

  $('#btnLimpiar')?.addEventListener('click', limpiar);

  $('#btnImprimir')?.addEventListener('click', () => {
    window.print();
  });

  $('#btnGuardar')?.addEventListener('click', guardarRetroactivo);

  const fAlta     = $('#fAlta');
  const fBaja     = $('#fBaja');
  const umasEl    = $('#umasACot');
  const salarioEl = $('#salario');

  salarioEl?.addEventListener('input', () => {
    if (Number(salarioEl.value) > 0) {
      setAutoSalaryFlag(false);
    }
  });

  umasEl?.addEventListener('input', setSalaryFromUMA);

  fAlta?.addEventListener('change', async () => {
    markPeriodosAuto();

    try {
      await ensureCatalogosFromAlta();
    } catch(e) {
      console.error(e);
    }

    setSalaryFromUMA();

    const meses = monthListInclusive(
      fAlta.value,
      window.__fechaCalculoDate || new Date()
    );

    setPeriodosAuto(meses.length);
  });

  fBaja?.addEventListener('change', async () => {
    markPeriodosAuto();

    const altaCalc = addDays(fBaja.value, 1);

    if (fAlta && altaCalc) {
      fAlta.value = altaCalc;
      fAlta.min = altaCalc;
    }

    try {
      await ensureCatalogosFromAlta();
    } catch(e) {
      console.error(e);
    }

    setSalaryFromUMA();

    const meses = monthListInclusive(
      fAlta.value,
      window.__fechaCalculoDate || new Date()
    );

    setPeriodosAuto(meses.length);
  });

  cargarDatos()
    .then(() => cargarRetroactivoSiExiste())
    .catch(console.error);

  if (fAlta?.value) {
    ensureCatalogosFromAlta()
      .then(setSalaryFromUMA)
      .catch(console.error);
  } else {
    setAutoSalaryFlag(true);
  }

  console.log('✅ JS retroactivo optimizado cargado.');
});
