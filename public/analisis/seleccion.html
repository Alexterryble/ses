<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Seleccionar tipo de cálculo</title>

  <style>
    :root{
      --azul:#003366;
      --azul2:#0b5ed7;
      --azul3:#eaf4ff;
      --dorado:#c9a24a;
      --gris:#64748b;
      --gris2:#f1f5f9;
      --blanco:#ffffff;
      --rojo:#dc2626;
      --verde:#16a34a;
      --shadow:0 22px 60px rgba(15,23,42,.16);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(201,162,74,.22), transparent 32%),
        linear-gradient(135deg, #eef4fb 0%, #dbeafe 45%, #f8fafc 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
      color:#0f172a;
    }

    .selector-card{
      width:100%;
      max-width:980px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(148,163,184,.35);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(14px);
    }

    .header{
      background:linear-gradient(135deg, var(--azul) 0%, #075985 100%);
      padding:28px 32px;
      color:#fff;
      display:grid;
      grid-template-columns:120px 1fr;
      gap:22px;
      align-items:center;
    }

    .logo-box{
      background:#fff;
      border-radius:22px;
      padding:8px;
      height:82px;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .logo-box img{
      width:150px;
      height:90px;
      object-fit:contain;
    }

    .header h1{
      font-size:32px;
      line-height:1.05;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .header p{
      font-size:15px;
      color:#dbeafe;
      font-weight:700;
    }

    .body{
      padding:34px;
    }

    .notice{
      border:1px solid #dbeafe;
      background:#f8fbff;
      border-radius:20px;
      padding:16px 18px;
      margin-bottom:24px;
      color:#334155;
      font-size:15px;
      font-weight:700;
      line-height:1.45;
    }

    .options{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
    }

    .option{
      position:relative;
      border:none;
      cursor:pointer;
      text-align:left;
      background:#fff;
      border-radius:24px;
      padding:26px;
      border:1px solid #d8e2ee;
      box-shadow:0 12px 30px rgba(15,23,42,.08);
      transition:.2s ease;
      min-height:230px;
      overflow:hidden;
    }

    .option::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.12;
      pointer-events:none;
    }

    .option.retro::before{
      background:radial-gradient(circle at top right, var(--azul2), transparent 45%);
    }

    .option.ordinario::before{
      background:radial-gradient(circle at top right, var(--verde), transparent 45%);
    }

    .option:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 42px rgba(15,23,42,.15);
      border-color:#93c5fd;
    }

    .icon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      margin-bottom:18px;
      color:#fff;
    }

    .retro .icon{
      background:linear-gradient(135deg, #003366, #0b5ed7);
    }

    .ordinario .icon{
      background:linear-gradient(135deg, #15803d, #22c55e);
    }

    .option h2{
      position:relative;
      font-size:25px;
      color:#0f172a;
      margin-bottom:10px;
    }

    .option p{
      position:relative;
      color:#64748b;
      font-size:15px;
      line-height:1.45;
      font-weight:700;
      margin-bottom:18px;
    }

    .tag{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:9px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
    }

    .retro .tag{
      background:#eaf4ff;
      color:#075985;
    }

    .ordinario .tag{
      background:#dcfce7;
      color:#166534;
    }

    .footer-actions{
      margin-top:28px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
    }

    .btn{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:13px 22px;
      min-height:46px;
      font-weight:900;
      font-size:15px;
      transition:.18s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-back{
      background:#e2e8f0;
      color:#334155;
    }

    .btn-menu{
      background:#fee2e2;
      color:#991b1b;
    }

    .debug{
      margin-top:18px;
      font-size:12px;
      color:#64748b;
      text-align:center;
      font-weight:700;
    }

    @media(max-width:760px){
      .header{
        grid-template-columns:1fr;
        text-align:center;
      }

      .logo-box{
        margin:0 auto;
      }

      .options{
        grid-template-columns:1fr;
      }

      .footer-actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <main class="selector-card">
    <section class="header">
      <div class="logo-box">
        <img src="/img/logo.png" alt="CIP Financial Group">
      </div>

      <div>
        <h1>Seleccionar cálculo</h1>
        <p>Elige si deseas continuar con cálculo retroactivo u ordinario.</p>
      </div>
    </section>

    <section class="body">
      <div class="notice">
        Las variables se conservarán automáticamente mediante <strong>sessionStorage</strong>.  
        No necesitas volver a capturar nombre, NSS, CURP, pensión ni datos calculados.
      </div>

      <div class="options">
        <button type="button" class="option retro" id="btnRetroactivo">
          <div class="icon">📄</div>
          <h2>Retroactivo</h2>
          <p>
            Continúa al cálculo retroactivo para usar los datos ya generados y calcular periodos anteriores.
          </p>
          <span class="tag">Ir a retroactivo</span>
        </button>

        <button type="button" class="option ordinario" id="btnOrdinario">
          <div class="icon">📊</div>
          <h2>Ordinario</h2>
          <p>
            Continúa al cálculo ordinario conservando las mismas variables del análisis actual.
          </p>
          <span class="tag">Ir a ordinario</span>
        </button>
      </div>

      <div class="footer-actions">
        <button type="button" class="btn btn-back" id="btnRegresar">
          ⬅️ Regresar
        </button>

        <button type="button" class="btn btn-menu" id="btnMenu">
          🏠 Salir al menú
        </button>
      </div>

      <div class="debug" id="estadoVariables">
        Verificando variables...
      </div>
    </section>
  </main>

  <script>
    const KEY_TABLA3 = 'CIP_DATOS_TABLA3';
    const KEY_CARATULA = 'CIP_DATOS_CARATULA';

    function getQS(){
      return window.location.search || '';
    }

    function leerSession(key){
      try {
        return JSON.parse(sessionStorage.getItem(key) || '{}');
      } catch (e) {
        console.error('No se pudo leer:', key, e);
        return {};
      }
    }

    function guardarOrigenSeleccion(tipo){
      const tabla3 = leerSession(KEY_TABLA3);
      const caratula = leerSession(KEY_CARATULA);

      const payload = {
        ...caratula,
        ...tabla3,

        tipoRetroactivoSeleccionado: tipo,
        origenSeleccionRetroactivo: '/analisis/retroactivo/seleccion.html',
        updatedAt: Date.now()
      };

      sessionStorage.setItem(KEY_TABLA3, JSON.stringify(payload));
      sessionStorage.setItem(KEY_CARATULA, JSON.stringify(payload));

      console.log('✅ Variables conservadas para selección:', payload);
    }

    function irA(tipo, ruta){
      guardarOrigenSeleccion(tipo);

      const qs = getQS();
      window.location.href = ruta + qs;
    }

    document.getElementById('btnRetroactivo')?.addEventListener('click', () => {
      irA('retroactivo', '/analisis/retroactivo/retroactivo.html');
    });

    document.getElementById('btnOrdinario')?.addEventListener('click', () => {
      irA('ordinario', '/analisis/retroactivo/Ordinario.html');
    });

    document.getElementById('btnRegresar')?.addEventListener('click', () => {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = '/analisis/afore/';
      }
    });

    document.getElementById('btnMenu')?.addEventListener('click', () => {
      window.location.href = '/index.php';
    });

    document.addEventListener('DOMContentLoaded', () => {
      const estado = document.getElementById('estadoVariables');
      const data = leerSession(KEY_TABLA3);

      if (Object.keys(data).length > 0) {
        estado.textContent = '✅ Variables detectadas y listas para enviarse.';
      } else {
        estado.textContent = '⚠️ No se detectaron variables en sesión, pero puedes continuar.';
      }
    });
  </script>

</body>
</html>
